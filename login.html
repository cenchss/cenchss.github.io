<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Operation Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <main class="login-wrap">
        <div class="login-card">
            <div class="login-brand">
                <span class="brand-mark">◎</span>
                <h1>Operation Tracker</h1>
                <p class="login-sub">Members only. Log in to view mission progress.</p>
            </div>

            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="username" required autocomplete="username" autocapitalize="none">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Enter</button>
            </form>
            <p id="errorMsg" class="error-msg hidden">Invalid username or password</p>
        </div>
        <p class="login-footer">If you know, you know.</p>
    </main>

    <script>
        // Hardcoded users
        const USERS = {
            'admin': 'admin',
            'dhruva': 'louie',
            'druv': 'degen'
        };

        // Already logged in? Straight to the dashboard.
        if (sessionStorage.getItem('loggedInUser')) {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (USERS[username] && USERS[username] === password) {
                sessionStorage.setItem('loggedInUser', username);
                window.location.href = 'index.html';
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>
</html>
